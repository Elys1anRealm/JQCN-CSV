<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京桥刹那 · 二次元足球赛事信息</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #eef2f5; padding: 1.5rem; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12); }
        .header { background: linear-gradient(135deg, #1e2a3a, #2c3e50); color: white; padding: 1.6rem 2rem; }
        .title { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .title h1 { font-size: 1.7rem; font-weight: 600; }
        .badge { background: rgba(255,255,240,0.2); padding: 6px 14px; border-radius: 60px; font-size: 0.85rem; }
        .stats-bar { display: flex; justify-content: space-between; margin-top: 1rem; gap: 15px; flex-wrap: wrap; }
        .info-chip { background: #ffffff20; border-radius: 40px; padding: 6px 16px; font-size: 0.9rem; }
        .search-box { margin-top: 1rem; display: flex; background: white; border-radius: 48px; padding: 0 16px; }
        .search-box input { width: 100%; padding: 10px 0; border: none; outline: none; font-size: 0.9rem; background: transparent; }
        .table-wrapper { overflow-x: auto; overflow-y: auto; max-height: 65vh; border-top: 1px solid #e2edf2; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 1100px; }
        .data-table th { background: #f0f6fa; color: #1f4a6e; padding: 14px 12px; border-bottom: 2px solid #cbdde6; text-align: left; cursor: pointer; position: sticky; top: 0; }
        .data-table td { padding: 10px 12px; border-bottom: 1px solid #e7edf2; }
        .data-table tr:hover td { background-color: #f8fbfd; }
        .sort-icon { font-size: 0.7rem; margin-left: 6px; opacity: 0.6; }
        .loading, .error-msg { text-align: center; padding: 2rem; }
        .error-msg { color: #c0392b; background: #fef5f0; border-radius: 16px; margin: 1rem; }
        footer { background: #f8fafc; padding: 1rem 2rem; font-size: 0.75rem; text-align: center; border-top: 1px solid #e2edf2; }
        pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; font-size: 0.75rem; margin: 1rem; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1>🏆 京桥刹那 · 二次元足球赛事信息 · <span id="recordCountSpan">0</span> 场对决</h1>
            <div class="badge">外部 CSV 动态加载</div>
        </div>
        <div class="stats-bar">
            <div class="info-chip" id="dataSourceBadge">📂 加载中...</div>
            <div class="info-chip" id="filteredInfo">🔍 全部显示</div>
        </div>
        <div class="search-box">
            <span>🔎</span>
            <input type="text" id="searchInput" placeholder="搜索球队/赛事/比分...">
        </div>
    </div>
    <div class="table-wrapper">
        <table class="data-table" id="dataTable">
            <thead id="tableHeader"><tr><th>加载中</th></tr></thead>
            <tbody id="tableBody"><tr><td class="loading">⏳ 正在加载数据，请稍后...</td></tr></tbody>
        </table>
        <div id="debugPanel" style="margin: 1rem; font-size: 0.75rem; color: #666; border-top: 1px solid #ddd; padding-top: 1rem;"></div>
    </div>
    <footer>✨ 单击列标题排序 | 全局搜索 | 数据文件：All_Games.csv（同目录）</footer>
</div>

<script>
    // 配置 CSV 文件名（与根目录一致）
    const CSV_FILE = './All_Games.csv';
    let currentData = [], originalColumns = [], filteredData = [], sortColumn = null, sortAscending = true, searchKeyword = "";
    const searchInput = document.getElementById("searchInput");
    const recordCountSpan = document.getElementById("recordCountSpan");
    const footerTotalSpan = document.getElementById("footerTotal");
    const filteredInfoSpan = document.getElementById("filteredInfo");
    const dataSourceBadge = document.getElementById("dataSourceBadge");
    const debugPanel = document.getElementById("debugPanel");

    function setNewData(data) {
        if (!data || data.length === 0) {
            currentData = [];
            originalColumns = [];
            filteredData = [];
            renderTable();
            return;
        }
        currentData = data;
        originalColumns = Object.keys(data[0]);
        sortColumn = null;
        sortAscending = true;
        searchKeyword = "";
        if (searchInput) searchInput.value = "";
        filteredData = [...currentData];
        renderTable();
        dataSourceBadge.innerHTML = `📂 数据源: ${CSV_FILE} (${currentData.length}场)`;
    }

    function applySearchFilter() {
        if (!searchKeyword.trim()) filteredData = [...currentData];
        else {
            const kw = searchKeyword.trim().toLowerCase();
            filteredData = currentData.filter(row => Object.values(row).some(v => v != null && String(v).toLowerCase().includes(kw)));
        }
        renderTable();
    }

    function renderTable() {
        const headerRow = document.getElementById("tableHeader");
        const tbody = document.getElementById("tableBody");
        if (!currentData.length) {
            headerRow.innerHTML = `<tr><th>暂无数据</th></tr>`;
            tbody.innerHTML = `<tr><td colspan="10">暂无比赛记录，请检查 CSV 文件格式是否正确（UTF-8编码、逗号分隔、至少包含表头+一行数据）。</td></tr>`;
            recordCountSpan.innerText = "0";
            footerTotalSpan.innerText = "0";
            filteredInfoSpan.innerHTML = `🔍 无数据`;
            return;
        }
        let dataToRender = [...filteredData];
        if (sortColumn) {
            dataToRender.sort((a,b) => {
                let va = a[sortColumn] ?? "", vb = b[sortColumn] ?? "";
                let isNum = (v) => !isNaN(parseFloat(v)) && isFinite(v);
                if (isNum(va) && isNum(vb)) { va = parseFloat(va); vb = parseFloat(vb); }
                else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
                if (va < vb) return sortAscending ? -1 : 1;
                if (va > vb) return sortAscending ? 1 : -1;
                return 0;
            });
        }
        const columns = originalColumns;
        const thRow = document.createElement('tr');
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            const span = document.createElement('span');
            span.className = 'sort-icon';
            span.textContent = (sortColumn === col) ? (sortAscending ? ' ▲' : ' ▼') : ' ⇅';
            th.appendChild(span);
            th.addEventListener('click', () => {
                if (sortColumn === col) sortAscending = !sortAscending;
                else { sortColumn = col; sortAscending = true; }
                renderTable();
            });
            thRow.appendChild(th);
        });
        headerRow.innerHTML = ''; headerRow.appendChild(thRow);
        tbody.innerHTML = '';
        if (dataToRender.length === 0) {
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = columns.length;
            td.textContent = '⚠️ 没有匹配的比赛，试试修改搜索词。';
            td.style.textAlign = 'center';
            td.style.padding = '2rem';
            tr.appendChild(td);
            tbody.appendChild(tr);
        } else {
            dataToRender.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = (row[col] !== undefined && row[col] !== null) ? row[col] : '—';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
        recordCountSpan.innerText = currentData.length.toLocaleString();
        footerTotalSpan.innerText = currentData.length.toLocaleString();
        filteredInfoSpan.innerHTML = (filteredData.length === currentData.length) ? `✅ 共 ${currentData.length} 场` : `🔍 筛选出 ${filteredData.length} / ${currentData.length} 场`;
    }

    async function loadCSV() {
        const fullUrl = new URL(CSV_FILE, window.location.href).href;
        debugPanel.innerHTML = `<div>🔍 尝试加载: ${fullUrl}</div><div>⏳ 发送请求...</div>`;
        try {
            const response = await fetch(CSV_FILE, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
            const text = await response.text();
            debugPanel.innerHTML += `<div>✅ 收到响应，文件大小: ${text.length} 字节</div>`;
            // 显示前200个字符
            debugPanel.innerHTML += `<details><summary>📄 CSV 前200字符预览</summary><pre>${escapeHtml(text.substring(0, 200))}</pre></details>`;
            Papa.parse(text, {
                header: true,
                skipEmptyLines: true,
                dynamicTyping: true,
                complete: (results) => {
                    if (results.errors.length) console.warn(results.errors);
                    const data = results.data.filter(row => Object.values(row).some(v => v !== undefined && v !== null && v !== ""));
                    debugPanel.innerHTML += `<div>📊 解析后有效数据行数: ${data.length}</div>`;
                    if (data.length === 0) {
                        debugPanel.innerHTML += `<div class="error-msg">❌ 解析后没有有效数据行。可能原因：CSV 只有表头没有数据，或分隔符不是逗号，或编码问题（请用 UTF-8 无 BOM 保存）。</div>`;
                        setNewData([]);
                    } else {
                        setNewData(data);
                    }
                },
                error: (err) => {
                    debugPanel.innerHTML += `<div class="error-msg">❌ PapaParse 解析失败: ${err.message}</div>`;
                    setNewData([]);
                }
            });
        } catch (err) {
            debugPanel.innerHTML += `<div class="error-msg">❌ 网络请求失败: ${err.message}<br>请确认文件 "${CSV_FILE}" 位于网站根目录，且文件名大小写正确。</div>`;
            setNewData([]);
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    let debounceTimer;
    searchInput.addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => { searchKeyword = e.target.value; applySearchFilter(); }, 250);
    });
    loadCSV();
</script>
</body>
</html>
