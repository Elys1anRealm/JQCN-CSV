<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>京桥刹那 · 二次元足球赛事信息</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #eef2f5;
            color: #1a2c3e;
            padding: 1.5rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e2a3a 0%, #2c3e50 100%);
            color: white;
            padding: 1.6rem 2rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title h1 {
            font-size: 1.7rem;
            font-weight: 600;
        }
        .badge {
            background: rgba(255,255,240,0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.85rem;
        }
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            gap: 15px;
        }
        .info-chip {
            background: #ffffff20;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.9rem;
        }
        .search-box {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 48px;
            padding: 0 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .search-box input {
            width: 100%;
            padding: 10px 0;
            border: none;
            outline: none;
            font-size: 0.9rem;
            background: transparent;
        }
        .search-box span {
            color: #7f8c8d;
            margin-right: 8px;
        }
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 65vh;
            border-top: 1px solid #e2edf2;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1100px;
        }
        .data-table th {
            background: #f0f6fa;
            color: #1f4a6e;
            font-weight: 600;
            padding: 14px 12px;
            border-bottom: 2px solid #cbdde6;
            text-align: left;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .data-table th:hover {
            background: #e2edf5;
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e7edf2;
            color: #2c3e4e;
        }
        .data-table tr:hover td {
            background-color: #f8fbfd;
        }
        .sort-icon {
            font-size: 0.7rem;
            margin-left: 6px;
            opacity: 0.6;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #2c6e9e;
        }
        footer {
            background: #f8fafc;
            padding: 1rem 2rem;
            font-size: 0.75rem;
            color: #5a6e7c;
            border-top: 1px solid #e2edf2;
            text-align: center;
        }
        @media (max-width: 680px) {
            body { padding: 0.8rem; }
            .header { padding: 1.2rem; }
            .title h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1>🏆 京桥刹那 · 二次元足球赛事信息 · <span id="recordCountSpan">0</span> 场对决</h1>
            <div class="badge">📅 S1杯赛 → 最新赛季 | 全记录</div>
        </div>
        <div class="stats-bar">
            <div class="info-chip" id="dataSourceBadge">📂 数据源: All_Games.csv</div>
            <div class="info-chip" id="filteredInfo">🔍 全部显示</div>
        </div>
        <div class="search-box">
            <span>🔎</span>
            <input type="text" id="searchInput" placeholder="搜索 球队/赛事/比分/阶段...">
        </div>
    </div>
    <div class="table-wrapper">
        <table class="data-table" id="dataTable">
            <thead id="tableHeader"><tr><th>加载赛事数据中...</th></tr></thead>
            <tbody id="tableBody"><tr><td class="loading">⏳ 正在从 All_Games.csv 读取比赛记录，请稍候...</td></tr></tbody>
        </table>
    </div>
    <footer>✨ 单击列标题排序 | 支持全局模糊搜索 | 数据文件：All_Games.csv（同目录）</footer>
</div>

<script>
    // 配置：CSV 文件名（与根目录一致）
    const CSV_FILE = './All_Games.csv';

    let currentData = [];
    let originalColumns = [];
    let filteredData = [];
    let sortColumn = null;
    let sortAscending = true;
    let searchKeyword = "";

    // DOM 元素
    const searchInput = document.getElementById("searchInput");
    const recordCountSpan = document.getElementById("recordCountSpan");
    const footerTotalSpan = document.getElementById("footerTotal");
    const filteredInfoSpan = document.getElementById("filteredInfo");
    const dataSourceBadge = document.getElementById("dataSourceBadge");

    function showLoading(message) {
        const tbody = document.getElementById("tableBody");
        if (tbody) tbody.innerHTML = `<tr><td colspan="20" class="loading">${message}</td></tr>`;
    }

    function setNewData(newArray) {
        if (!newArray || newArray.length === 0) {
            currentData = [];
            originalColumns = [];
            filteredData = [];
            sortColumn = null;
            sortAscending = true;
            searchKeyword = "";
            if (searchInput) searchInput.value = "";
            renderTable();
            return;
        }
        currentData = [...newArray];
        originalColumns = Object.keys(currentData[0]);
        sortColumn = null;
        sortAscending = true;
        searchKeyword = "";
        if (searchInput) searchInput.value = "";
        filteredData = [...currentData];
        renderTable();
        dataSourceBadge.innerHTML = `📂 数据源: All_Games.csv (${currentData.length}场)`;
    }

    function applySearchFilter() {
        if (!searchKeyword.trim()) {
            filteredData = [...currentData];
        } else {
            const kw = searchKeyword.trim().toLowerCase();
            filteredData = currentData.filter(row => 
                Object.values(row).some(v => v != null && String(v).toLowerCase().includes(kw))
            );
        }
        renderTable();
    }

    function renderTable() {
        const headerRow = document.getElementById("tableHeader");
        const tbody = document.getElementById("tableBody");

        if (!currentData.length) {
            headerRow.innerHTML = `<tr><th>暂无数据</th></tr>`;
            tbody.innerHTML = `<tr><td colspan="10">暂无比赛记录，请检查 All_Games.csv 是否存在且格式正确。</td></tr>`;
            recordCountSpan.innerText = "0";
            footerTotalSpan.innerText = "0";
            filteredInfoSpan.innerHTML = `🔍 无数据`;
            return;
        }

        let dataToRender = [...filteredData];
        if (sortColumn) {
            dataToRender.sort((a, b) => {
                let valA = a[sortColumn];
                let valB = b[sortColumn];
                const isNum = (v) => !isNaN(parseFloat(v)) && isFinite(v);
                if (valA == null) valA = "";
                if (valB == null) valB = "";
                if (isNum(valA) && isNum(valB)) {
                    valA = parseFloat(valA);
                    valB = parseFloat(valB);
                } else {
                    valA = String(valA).toLowerCase();
                    valB = String(valB).toLowerCase();
                }
                if (valA < valB) return sortAscending ? -1 : 1;
                if (valA > valB) return sortAscending ? 1 : -1;
                return 0;
            });
        }

        const columns = originalColumns;
        const thRow = document.createElement('tr');
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            const iconSpan = document.createElement('span');
            iconSpan.className = 'sort-icon';
            iconSpan.textContent = (sortColumn === col) ? (sortAscending ? ' ▲' : ' ▼') : ' ⇅';
            th.appendChild(iconSpan);
            th.addEventListener('click', () => {
                if (sortColumn === col) {
                    sortAscending = !sortAscending;
                } else {
                    sortColumn = col;
                    sortAscending = true;
                }
                renderTable();
            });
            thRow.appendChild(th);
        });
        headerRow.innerHTML = '';
        headerRow.appendChild(thRow);

        tbody.innerHTML = '';
        if (dataToRender.length === 0) {
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = columns.length;
            td.textContent = '⚠️ 没有匹配的比赛，试试修改搜索词。';
            td.style.textAlign = 'center';
            td.style.padding = '2rem';
            tr.appendChild(td);
            tbody.appendChild(tr);
        } else {
            dataToRender.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    let cellValue = (row[col] !== undefined && row[col] !== null) ? row[col] : '—';
                    td.textContent = cellValue;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        const totalAll = currentData.length;
        const filteredCount = dataToRender.length;
        recordCountSpan.innerText = totalAll.toLocaleString();
        footerTotalSpan.innerText = totalAll.toLocaleString();
        if (filteredCount === totalAll) {
            filteredInfoSpan.innerHTML = `✅ 共 ${totalAll} 场完整赛事`;
        } else {
            filteredInfoSpan.innerHTML = `🔍 筛选出 ${filteredCount} / ${totalAll} 场比赛`;
        }
    }

    // 加载 CSV
    function loadCSV() {
        showLoading(`⏳ 正在从 ${CSV_FILE} 加载数据...`);
        fetch(CSV_FILE, { cache: "no-store" })
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.text();
            })
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    dynamicTyping: true,
                    complete: (results) => {
                        if (results.errors.length) console.warn(results.errors);
                        let data = results.data.filter(row => Object.values(row).some(v => v != null && v !== ""));
                        if (data.length === 0) throw new Error("CSV 无有效数据行");
                        setNewData(data);
                    },
                    error: (err) => { throw new Error("解析失败: " + err.message); }
                });
            })
            .catch(err => {
                console.error(err);
                showLoading(`❌ 加载失败: ${err.message}<br>请确认文件 "${CSV_FILE}" 位于网站根目录且格式为 UTF-8`);
                setNewData([]);
            });
    }

    // 搜索防抖
    let debounceTimer;
    searchInput.addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            searchKeyword = e.target.value;
            applySearchFilter();
        }, 250);
    });

    // 启动
    loadCSV();
</script>
</body>
</html>
